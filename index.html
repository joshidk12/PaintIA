<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 IA Reconocedora de Dibujos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .row {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .col {
            flex: 1;
            min-width: 300px;
        }
        
        .canvas-area {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
        }
        
        canvas {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: auto;
        }
        
        .controls {
            margin-top: 15px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-clear {
            background: #ff6b6b;
            color: white;
            width: 100%;
        }
        
        .btn-clear:hover {
            background: #ee5253;
            transform: translateY(-2px);
        }
        
        .btn-predict {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            font-size: 18px;
        }
        
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .result-card {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
        }
        
        .result {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .prediction {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            text-transform: capitalize;
        }
        
        .confidence {
            font-size: 24px;
            color: #00b894;
            margin-top: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .classes {
            background: white;
            border-radius: 8px;
            padding: 15px;
        }
        
        .class-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            color: #667eea;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
            text-transform: capitalize;
        }
        
        @media (max-width: 768px) {
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 IA Reconocedora de Dibujos</h1>
        <p class="subtitle">Dibuja algo y la inteligencia artificial adivinará qué es</p>
        
        <div class="row">
            <div class="col">
                <div class="canvas-area">
                    <canvas id="canvas" width="400" height="400"></canvas>
                    <div class="controls">
                        <button class="btn-clear" id="clearBtn">🧹 Limpiar</button>
                    </div>
                    <button class="btn-predict" id="predictBtn">✨ ¿Qué es esto?</button>
                </div>
            </div>
            
            <div class="col">
                <div class="result-card">
                    <div class="result">
                        <div class="prediction" id="prediction">—</div>
                        <div class="confidence" id="confidence">—</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="status info" id="status">
                            ℹ️ Dibuja algo y presiona el botón
                        </div>
                    </div>
                    
                    <div class="classes">
                        <strong>📋 Clases disponibles:</strong>
                        <div id="classesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ================================================================
        // CÓDIGO COMPLETO - VERSIÓN CORREGIDA
        // ================================================================
        
        // --- Elementos del DOM ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const predictBtn = document.getElementById('predictBtn');
        const predictionEl = document.getElementById('prediction');
        const confidenceEl = document.getElementById('confidence');
        const progressFill = document.getElementById('progressFill');
        const statusEl = document.getElementById('status');
        const classesList = document.getElementById('classesList');
        
        // --- Variables de dibujo ---
        let drawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // --- Configurar canvas ---
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 5;
        
        // --- Cargar clases (versión manual, sin tojson) ---
        const classes = ['circulo', 'cuadrado', 'triangulo', 'casa'];
        classesList.innerHTML = classes.map(c => 
            `<span class="class-tag">${c}</span>`
        ).join('');
        
        // --- Función: Obtener posición del mouse ---
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        // --- Empezar a dibujar ---
        function startDrawing(e) {
            e.preventDefault();
            drawing = true;
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            ctx.beginPath();
            console.log('🖌️ Dibujando...');
        }
        
        // --- Dibujar ---
        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            
            const pos = getMousePos(e);
            const x = Math.max(0, Math.min(canvas.width, pos.x));
            const y = Math.max(0, Math.min(canvas.height, pos.y));
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            lastX = x;
            lastY = y;
        }
        
        // --- Parar de dibujar ---
        function stopDrawing(e) {
            drawing = false;
            console.log('✋ Dejó de dibujar');
        }
        
        // --- Limpiar canvas ---
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            predictionEl.textContent = '—';
            confidenceEl.textContent = '—';
            progressFill.style.width = '0%';
            statusEl.innerHTML = 'ℹ️ Canvas limpiado. ¡Dibuja algo!';
            statusEl.className = 'status info';
            console.log('🧹 Canvas limpiado');
        }
        
        // --- Predecir ---
        async function predict() {
            try {
                predictBtn.disabled = true;
                predictBtn.textContent = '⏳ Pensando...';
                statusEl.innerHTML = '⏳ La IA está analizando tu dibujo...';
                statusEl.className = 'status info';
                
                console.log('📸 Enviando imagen al servidor...');
                
                // Obtener imagen del canvas
                const imageData = canvas.toDataURL('image/png');
                
                // Enviar al servidor
                const response = await fetch('/predecir', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ imagen: imageData })
                });
                
                const result = await response.json();
                console.log('📨 Respuesta:', result);
                
                if (result.exito) {
                    predictionEl.textContent = result.clase;
                    confidenceEl.textContent = result.porcentaje;
                    progressFill.style.width = (result.confianza * 100) + '%';
                    statusEl.innerHTML = `✅ ¡Es un ${result.clase}! (${result.porcentaje} confianza)`;
                    statusEl.className = 'status success';
                } else {
                    throw new Error(result.error || 'Error en la predicción');
                }
                
            } catch (error) {
                console.error('❌ Error:', error);
                statusEl.innerHTML = `❌ Error: ${error.message}`;
                statusEl.className = 'status error';
                predictionEl.textContent = 'Error';
                confidenceEl.textContent = '—';
                progressFill.style.width = '0%';
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = '✨ ¿Qué es esto?';
            }
        }
        
        // --- EVENTOS DEL MOUSE ---
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        
        // --- EVENTOS TÁCTILES (móviles) ---
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        
        // --- BOTONES ---
        clearBtn.addEventListener('click', clearCanvas);
        predictBtn.addEventListener('click', predict);
        
        // --- Prevenir menú contextual ---
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        console.log('✅ Aplicación lista! Dibuja en el canvas con el mouse');
        console.log('📏 Tamaño canvas:', canvas.width, 'x', canvas.height);
    </script>
</body>
</html>
